    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ExpertSync",
      "url": "https://expert-sync.com/",
      "logo": "https://expert-sync.com/favicon.png",
      "description": "ExpertSync crée des assistants IA basés sur vos procédures internes pour les équipes opérationnelles en manufacturier, distribution et transformation.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CA",
        "addressRegion": "QC"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "url": "https://calendly.com/dumoulinsolutions/sonoria-appel-decouverte"
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ExpertSync",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Chatbot IA ancré sur vos procédures internes pour les équipes opérationnelles en manufacturier, distribution et transformation. Réponses instantanées depuis vos manuels. Mise en place en 7–14 jours.",
      "url": "https://expert-sync.com/",
      "inLanguage": ["fr-CA", "en"],
      "offers": {
        "@type": "Offer",
        "price": "500",
        "priceCurrency": "USD",
        "description": "Un cas d'usage, une équipe. Implémentation en 7–14 jours."
      },
      "featureList": [
        "Réponses basées exclusivement sur vos documents internes",
        "Traçabilité complète des sources (document, section, page)",
        "Aucun entraînement IA public",
        "Infrastructure de données privée et isolée",
        "Déploiement en environnement isolé possible",
        "Mise en place en 7 à 14 jours",
        "Zéro formation requise"
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Est-ce un remplacement de nos manuels techniques ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. ExpertSync ne remplace pas vos manuels, il les rend accessibles. Vos fiches techniques et procédures restent la source de vérité. ExpertSync aide vos techniciens à trouver la bonne spécification en quelques secondes, sans chercher."
          }
        },
        {
          "@type": "Question",
          "name": "Faut-il former les employés pour l'utiliser ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. C'est un chatbot — vos employés posent une question en langage courant et obtiennent une réponse. Aucune formation, aucun nouvel outil à apprendre. Si vous savez envoyer un texto, vous savez utiliser ExpertSync."
          }
        },
        {
          "@type": "Question",
          "name": "Y a-t-il un essai gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous n'offrons pas d'essai gratuit ouvert. ExpertSync commence par un pilote ciblé pour garantir des résultats précis avec vos documents techniques spécifiques."
          }
        },
        {
          "@type": "Question",
          "name": "À qui est-ce destiné ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ExpertSync est conçu pour les fabricants d'équipements industriels : techniciens d'assemblage, ingénieurs de maintenance, équipes qualité et responsables de production qui ont besoin d'un accès rapide aux spécifications exactes."
          }
        }
      ]
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">

      "inLanguage": ["fr-CA", "en"]
    }
    </script>
