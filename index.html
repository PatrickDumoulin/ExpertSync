<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpertSync | IA basée sur vos procédures pour équipes opérationnelles</title>
    <meta name="description" content="ExpertSync est un assistant IA basé sur les règles pour les équipes en manufacturier, distribution et transformation. Réponses instantanées à partir de vos manuels internes. Mise en place en 7-14 jours." />
    <meta name="author" content="ExpertSync" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rule-rule-ai.lovable.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ExpertSync | IA basée sur vos procédures internes" />
    <meta property="og:description" content="Vos équipes posent toujours les mêmes questions? ExpertSync donne la bonne réponse, basée uniquement sur vos documents internes. Aucune hallucination." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rule-rule-ai.lovable.app/" />
    <meta property="og:locale" content="fr_CA" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="ExpertSync" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ExpertSync | IA basée sur vos procédures internes" />
    <meta name="twitter:description" content="Assistant IA qui répond strictement à partir de vos manuels et procédures. Pour les équipes en manufacturier, distribution et transformation." />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#1e293b" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ExpertSync",
      "applicationCategory": "BusinessApplication",
      "description": "Assistant IA basé sur les règles pour les équipes opérationnelles en manufacturier, distribution et transformation. Réponses instantanées à partir de vos procédures internes.",
      "url": "https://rule-rule-ai.lovable.app/",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "500",
        "priceCurrency": "USD",
        "billingIncrement": "P1M",
        "description": "Un cas d'usage, une équipe. Implémentation en 7-14 jours."
      },
      "featureList": [
        "Réponses basées exclusivement sur vos documents internes",
        "Traçabilité complète des sources",
        "Aucun entraînement IA public",
        "Infrastructure de données privée",
        "Déploiement en environnement isolé possible"
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Est-ce un remplacement de nos procédures ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. ExpertSync ne remplace pas vos procédures, il les rend accessibles. Vos manuels et procédures restent la source unique de vérité. ExpertSync aide simplement vos équipes à trouver et appliquer la bonne information plus rapidement."
          }
        },
        {
          "@type": "Question",
          "name": "Peut-on l'étendre à d'autres équipes par la suite ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. L'étape 1 est volontairement limitée à une équipe et un cas d'usage pour valider la précision et la valeur. Une fois prouvé, ExpertSync peut être étendu à d'autres équipes, ensembles documentaires et cas d'usage."
          }
        },
        {
          "@type": "Question",
          "name": "Y a-t-il un essai gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous n'offrons pas d'essai gratuit ouvert. ExpertSync commence par un pilote ciblé pour garantir des résultats précis."
          }
        },
        {
          "@type": "Question",
          "name": "À qui est-ce destiné ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ExpertSync est conçu pour les équipes opérationnelles et terrain dans les industries manufacturières, de distribution et de transformation."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
